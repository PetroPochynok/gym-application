# --- Application core settings ---
spring.application.name=gym-crm
spring.profiles.default=local
server.servlet.context-path=/gym-crm
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# --- Database & Persistence ---
spring.jpa.format-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- Service Discovery (Eureka) ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# --- Actuator & Monitoring ---
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# --- Resilience4j Circuit Breaker (Workload Service) ---
# Opens if 50% of the last 5 requests fail. Waits 15s before half-open retry.
resilience4j.circuitbreaker.instances.workloadService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.workloadService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.workloadService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.workloadService.waitDurationInOpenState=15000
resilience4j.circuitbreaker.instances.workloadService.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.workloadService.automaticTransitionFromOpenToHalfOpenEnabled=true

